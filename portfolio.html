<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Selected Works | STRN Studio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Header -->
    <header class="header">
        <div class="header__inner">
            <a href="index.html" class="logo">
                STRN<span>.</span>STUDIO
            </a>
            <nav class="nav">
                <a href="index.html#about" class="nav__link">SOBRE MÍ</a>
                <a href="index.html#services" class="nav__link">SERVICIOS</a>
                <a href="index.html#blueprint" class="nav__link">PROCESO</a>
                <a href="portfolio.html" class="nav__link">PORTAFOLIO</a>
                <a href="blog.html" class="nav__link">BLOG</a>

                <div class="lang-switch" style="display: inline-flex; gap: 0.5rem; align-items: center; margin: 0 1rem; font-weight: 600; font-size: 0.875rem;">
                    <a href="#" style="color: white; border-bottom: 2px solid var(--color-accent);">ES</a> 
                    <span style="color: var(--color-glass-border);">|</span> 
                    <a href="#" style="color: var(--color-text-muted); transition: color 0.3s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='var(--color-text-muted)'">EN</a>
                </div>

                <a href="index.html#audit" class="nav__btn">Auditoría Gratuita</a>
            </nav>
            <button class="mobile-menu-btn">
                <i class="ph ph-list"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="smooth-wrapper">
        <div id="smooth-content">
            
            <section class="portfolio section" id="portfolio" style="padding-top: 12rem;">
                <div class="container">
                    <div class="section-header reveal">
                        <span class="section-subtitle">FULL ARCHIVE</span>
                        <h2 class="section-title">ALL SELECTED WORKS</h2>
                    </div>

                    <!-- Dynamic Filters -->
                    <div class="portfolio-filters reveal">
                        <button class="filter-btn active" data-filter="all">All Works</button>
                        <button class="filter-btn" data-filter="Brand Identity">Brand Identity</button>
                        <button class="filter-btn" data-filter="Digital Design">Digital Design</button>
                        <button class="filter-btn" data-filter="Physical Branding">Physical Branding</button>
                    </div>
                </div> <!-- Close container to allow full width -->

                <!-- Full Width Mosaic Grid -->
                <div style="width: 100%;">
                    <div class="portfolio-grid" id="full-portfolio" style="gap: 0; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 450px; background: black;">
                        <!-- Projects injected by script below -->
                    </div>
                </div>
            </section>

        </div>
        
        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <div class="footer__inner">
                    <div class="footer__brand">
                        <a href="index.html" class="logo">STRN<span>.</span>STUDIO</a>
                        <p>High-End Digital Agency.<br>From Málaga to the world.</p>
                    </div>
                    <div class="footer__social">
                        <a href="#"><i class="ph ph-instagram-logo"></i></a>
                        <a href="#"><i class="ph ph-behance-logo"></i></a>
                        <a href="#"><i class="ph ph-linkedin-logo"></i></a>
                        <a href="#"><i class="ph ph-twitter-logo"></i></a>
                    </div>
                </div>
                <div class="footer__bottom">
                    <p>&copy; 2026 STRN Studio. All rights reserved.</p>
                    <a href="#" class="back-to-top">Back to top <i class="ph ph-arrow-up"></i></a>
                </div>
            </div>
        </footer>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/portfolio.js"></script>
</body>
</html>
