# ================================================================
# STRN Studio — netlify.toml
# Static site deployment config for Netlify
# ================================================================

[build]
  publish = "."

# ----------------------------------------------------------------
# Global HTTP Headers (Security + Performance)
# ----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy — allows Supabase, Google Fonts, CDNs
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://vojwdyubksoozhyvnbfu.supabase.co wss://vojwdyubksoozhyvnbfu.supabase.co; frame-ancestors 'none';"
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Performance
    Cache-Control = "public, max-age=3600"

# Cache static assets longer
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ----------------------------------------------------------------
# Redirects & Clean URLs
# ----------------------------------------------------------------

# Admin route (clean URL)
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Work/portfolio dynamic routing
[[redirects]]
  from = "/work/:slug"
  to   = "/portfolio-post.html?slug=:slug"
  status = 200

# Blog dynamic routing
[[redirects]]
  from = "/blog/:slug"
  to   = "/blog-post.html?slug=:slug"
  status = 200

# SPA fallback — catch unknown routes gracefully
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404

# ----------------------------------------------------------------
# Environment Variables (for Netlify build context)
# ----------------------------------------------------------------
[context.production.environment]
  NODE_ENV             = "production"
  SUPABASE_URL         = "https://vojwdyubksoozhyvnbfu.supabase.co"
