# ================================================================ (Build Trigger)
# STRN Studio — netlify.toml
# Static site deployment config for Netlify
# ================================================================

[build]
  command = "node build.js"
  publish = "dist"

# ----------------------------------------------------------------
# Global HTTP Headers (Security + Performance)
# ----------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy — allows Supabase, Google Fonts, CDNs
    Content-Security-Policy = """
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://fonts.googleapis.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com https://unpkg.com https://cdn.jsdelivr.net;
    font-src 'self' https://fonts.gstatic.com https://unpkg.com https://cdn.jsdelivr.net;
    img-src 'self' data: https: blob:;
    connect-src 'self' https://vojwdyubksoozhyvnbfu.supabase.co wss://vojwdyubksoozhyvnbfu.supabase.co https://cdn.jsdelivr.net https://unpkg.com;
    frame-ancestors 'none';
  """
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Performance
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets longer
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ----------------------------------------------------------------
# Redirects & Clean URLs
# ----------------------------------------------------------------

# Admin route (clean URL)
[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Edge Functions for system maintenance override
[[edge_functions]]
  path = "/*"
  function = "maintenance"

# Edge Functions for dynamic SEO injection
[[edge_functions]]
  path = "/system/*"
  function = "metadata"

[[edge_functions]]
  path = "/current/*"
  function = "metadata"


# Work/portfolio dynamic routing (clean url)
[[redirects]]
  from = "/system/:slug"
  to   = "/system-post.html?slug=:slug"
  status = 200

# Blog dynamic routing (clean url)
[[redirects]]
  from = "/current/:slug"
  to   = "/current-post.html?slug=:slug"
  status = 200

# Legacy redirects compatibility
[[redirects]]
  from = "/work/:slug"
  to   = "/system-post.html?slug=:slug"
  status = 200

[[redirects]]
  from = "/blog/:slug"
  to   = "/current-post.html?slug=:slug"
  status = 200

# SPA fallback — catch unknown routes gracefully
[[redirects]]
  from = "/*"
  to   = "/404.html"
  status = 404

# ----------------------------------------------------------------
# Environment Variables (for Netlify build context)
# ----------------------------------------------------------------
[context.production.environment]
  NODE_ENV             = "production"
  SUPABASE_URL         = "https://vojwdyubksoozhyvnbfu.supabase.co"
